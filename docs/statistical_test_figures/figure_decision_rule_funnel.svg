<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" font-family="Helvetica, Arial, sans-serif"><rect width="1500" height="1080" fill="#fbfaf7"/><rect x="0" y="0" width="14" height="1080" fill="#2f6f73"/><text x="60" y="58" font-size="38" font-weight="700" fill="#172033">From 18 aspects to nudge candidates</text><text x="60" y="92" font-size="22" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">18の項目から、ナッジ候補を絞り込む決定ルール</text><rect x="260.0" y="150" width="980.0" height="78" rx="8" fill="#2f6f73"/><text x="750.0" y="184" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">18</text><text x="750.0" y="212" font-size="18" fill="#eaf1f0" text-anchor="middle">Aspect models tested</text><text x="1270.0" y="198" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">検証した項目モデル</text><line x1="750.0" y1="228" x2="750.0" y2="280.0" stroke="#33414f" stroke-width="2"/><polygon points="742.0,278.0 758.0,278.0 750.0,290.0" fill="#33414f"/><text x="774.0" y="259.0" font-size="16" fill="#33414f" text-anchor="start" font-style="italic">Keep pain-point aspects with a low-rating risk</text><rect x="466.7" y="294" width="566.7" height="78" rx="8" fill="#2f6f73"/><text x="750.0" y="328" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">10</text><text x="750.0" y="356" font-size="18" fill="#eaf1f0" text-anchor="middle">Harmful association (odds ratio &gt; 1)</text><text x="1270.0" y="342" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">有害な関連(オッズ比 &gt; 1)</text><line x1="750.0" y1="372" x2="750.0" y2="424.0" stroke="#33414f" stroke-width="2"/><polygon points="742.0,422.0 758.0,422.0 750.0,434.0" fill="#33414f"/><text x="774.0" y="403.0" font-size="16" fill="#33414f" text-anchor="start" font-style="italic">Correct p-values across all tests</text><rect x="544.2" y="438" width="411.7" height="78" rx="8" fill="#5b8d8f"/><text x="750.0" y="472" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">7</text><text x="750.0" y="500" font-size="18" fill="#eaf1f0" text-anchor="middle">FDR-significant (Benjamini-Hochberg)</text><text x="1270.0" y="486" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">FDR有意(BH補正)</text><line x1="750.0" y1="516" x2="750.0" y2="568.0" stroke="#33414f" stroke-width="2"/><polygon points="742.0,566.0 758.0,566.0 750.0,578.0" fill="#33414f"/><text x="774.0" y="547.0" font-size="16" fill="#33414f" text-anchor="start" font-style="italic">Drop rare aspects (e.g. staff communication, n &lt; 20)</text><rect x="570.0" y="582" width="360.0" height="78" rx="8" fill="#5b8d8f"/><text x="750.0" y="616" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">6</text><text x="750.0" y="644" font-size="18" fill="#eaf1f0" text-anchor="middle">≥ 20 pooled mentions</text><text x="1270.0" y="630" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">統合データで 20件以上の言及</text><text x="750.0" y="740" font-size="18" fill="#172033" text-anchor="middle" font-weight="700">Classify each survivor</text><rect x="130.0" y="766" width="600" height="168" rx="8" fill="#fbfaf7" stroke="#2f6f73" stroke-width="3"/><rect x="130.0" y="766" width="600" height="6" fill="#2f6f73"/><text x="154.0" y="810" font-size="24" font-weight="700" fill="#2f6f73">3 Information nudges</text><text x="154.0" y="836" font-size="15" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">情報ナッジ</text><text x="154.0" y="874" font-size="18" fill="#172033">Itinerary fit, Opening hours, Wayfinding</text><rect x="770.0" y="766" width="600" height="168" rx="8" fill="#fbfaf7" stroke="#c06c38" stroke-width="3"/><rect x="770.0" y="766" width="600" height="6" fill="#c06c38"/><text x="794.0" y="810" font-size="24" font-weight="700" fill="#c06c38">3 Operator fixes</text><text x="794.0" y="836" font-size="15" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">事業者による改善</text><text x="794.0" y="874" font-size="18" fill="#172033">Cleanliness, Price, Crowding</text></svg>