<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940" font-family="Helvetica, Arial, sans-serif"><rect width="1500" height="940" fill="#fbfaf7"/><rect x="0" y="0" width="14" height="940" fill="#2f6f73"/><text x="60" y="58" font-size="38" font-weight="700" fill="#172033">What we can and cannot claim</text><text x="60" y="92" font-size="22" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">主張できること・できないこと</text><rect x="260" y="150" width="1060" height="188" rx="10" fill="#f1ece4" stroke="#bc6c25" stroke-width="3" stroke-dasharray="10 7"/><text x="296" y="220" font-size="34" font-weight="700" fill="#bc6c25">Causal claim</text><text x="296" y="254" font-size="19" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">因果の主張</text><text x="296" y="292" font-size="19" fill="#172033">Requires a randomized experiment - next semester (slide 13).</text><text x="296" y="318" font-size="15" fill="#172033" font-family="'Noto Sans CJK JP', sans-serif">無作為化実験が必要 — 来学期(スライド13)。</text><text x="1320" y="361.0" font-size="16" fill="#bc6c25" font-style="italic" text-anchor="end">the gap an experiment closes</text><rect x="260" y="372" width="1060" height="188" rx="10" fill="#2f6f73"/><text x="296" y="442" font-size="34" font-weight="700" fill="#ffffff">Association</text><text x="296" y="476" font-size="19" fill="#eaf1f0" font-family="'Noto Sans CJK JP', sans-serif">関連</text><text x="296" y="514" font-size="19" fill="#eaf1f0">FDR-tested adjusted odds ratios. This is what the study supports.</text><text x="296" y="540" font-size="15" fill="#eaf1f0" font-family="'Noto Sans CJK JP', sans-serif">FDR補正済みの調整オッズ比。本研究が支持する範囲。</text><rect x="1070" y="440.0" width="214" height="52" rx="26" fill="#9a031e"/><text x="1177.0" y="474.0" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle">YOU ARE HERE</text><rect x="260" y="594" width="1060" height="188" rx="10" fill="#6f8f72"/><text x="296" y="664" font-size="34" font-weight="700" fill="#ffffff">Description</text><text x="296" y="698" font-size="19" fill="#eaf1f0" font-family="'Noto Sans CJK JP', sans-serif">記述</text><text x="296" y="736" font-size="19" fill="#eaf1f0">Prevalence, counts, and language mix of the reviews.</text><text x="296" y="762" font-size="15" fill="#eaf1f0" font-family="'Noto Sans CJK JP', sans-serif">口コミの有病率・件数・言語構成。</text><line x1="150" y1="776.0" x2="150" y2="156.0" stroke="#33414f" stroke-width="3"/><polygon points="141,172.0 159,172.0 150,156.0" fill="#33414f"/><text x="128" y="466.0" font-size="18" fill="#33414f" text-anchor="middle" transform="rotate(-90 128 466.0)">stronger causal claim</text></svg>