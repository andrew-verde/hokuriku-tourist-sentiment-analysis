<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1080" viewBox="0 0 1500 1080" font-family="Helvetica, Arial, sans-serif"><rect width="1500" height="1080" fill="#fbfaf7"/><rect x="0" y="0" width="14" height="1080" fill="#2f6f73"/><text x="60" y="58" font-size="38" font-weight="700" fill="#172033">From 18 topics to nudge candidates</text><text x="60" y="92" font-size="22" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">18の話題から、ナッジ候補を絞り込む</text><rect x="260.0" y="150" width="980.0" height="78" rx="8" fill="#2f6f73"/><text x="750.0" y="184" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">18</text><text x="750.0" y="212" font-size="18" fill="#eaf1f0" text-anchor="middle">Topics tested</text><text x="1270.0" y="198" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">調べた話題</text><line x1="750.0" y1="228" x2="750.0" y2="280.0" stroke="#33414f" stroke-width="2"/><polygon points="742.0,278.0 758.0,278.0 750.0,290.0" fill="#33414f"/><text x="774.0" y="259.0" font-size="16" fill="#33414f" text-anchor="start" font-style="italic">Keep problems tied to low ratings</text><rect x="466.7" y="294" width="566.7" height="78" rx="8" fill="#2f6f73"/><text x="750.0" y="328" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">10</text><text x="750.0" y="356" font-size="18" fill="#eaf1f0" text-anchor="middle">Linked to worse ratings</text><text x="1270.0" y="342" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">悪い評価と結びつく</text><line x1="750.0" y1="372" x2="750.0" y2="424.0" stroke="#33414f" stroke-width="2"/><polygon points="742.0,422.0 758.0,422.0 750.0,434.0" fill="#33414f"/><text x="774.0" y="403.0" font-size="16" fill="#33414f" text-anchor="start" font-style="italic">Tighten the bar for testing many topics</text><rect x="544.2" y="438" width="411.7" height="78" rx="8" fill="#5b8d8f"/><text x="750.0" y="472" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">7</text><text x="750.0" y="500" font-size="18" fill="#eaf1f0" text-anchor="middle">Pass the strict test</text><text x="1270.0" y="486" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">厳しい基準を通過</text><line x1="750.0" y1="516" x2="750.0" y2="568.0" stroke="#33414f" stroke-width="2"/><polygon points="742.0,566.0 758.0,566.0 750.0,578.0" fill="#33414f"/><text x="774.0" y="547.0" font-size="16" fill="#33414f" text-anchor="start" font-style="italic">Drop rarely-mentioned topics (seen under 20 times)</text><rect x="570.0" y="582" width="360.0" height="78" rx="8" fill="#5b8d8f"/><text x="750.0" y="616" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">6</text><text x="750.0" y="644" font-size="18" fill="#eaf1f0" text-anchor="middle">Mentioned enough times</text><text x="1270.0" y="630" font-size="15" fill="#5b677a" text-anchor="start" font-family="'Noto Sans CJK JP', sans-serif">十分な回数現れた</text><text x="750.0" y="740" font-size="18" fill="#172033" text-anchor="middle" font-weight="700">Sort each kept topic</text><rect x="130.0" y="766" width="600" height="168" rx="8" fill="#fbfaf7" stroke="#2f6f73" stroke-width="3"/><rect x="130.0" y="766" width="600" height="6" fill="#2f6f73"/><text x="154.0" y="810" font-size="24" font-weight="700" fill="#2f6f73">3 Information can help</text><text x="154.0" y="836" font-size="15" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">情報で改善できる</text><text x="154.0" y="874" font-size="18" fill="#172033">Itinerary fit, Opening hours, Wayfinding</text><rect x="770.0" y="766" width="600" height="168" rx="8" fill="#fbfaf7" stroke="#c06c38" stroke-width="3"/><rect x="770.0" y="766" width="600" height="6" fill="#c06c38"/><text x="794.0" y="810" font-size="24" font-weight="700" fill="#c06c38">3 Operator must act</text><text x="794.0" y="836" font-size="15" fill="#5b677a" font-family="'Noto Sans CJK JP', sans-serif">事業者の対応が必要</text><text x="794.0" y="874" font-size="18" fill="#172033">Cleanliness, Price, Crowding</text></svg>