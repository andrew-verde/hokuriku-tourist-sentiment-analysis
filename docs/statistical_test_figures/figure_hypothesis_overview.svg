<text x="172.00" y="186.00" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#172033">Holds at review and POI level; within-POI rating borderline.</text>
<rect x="590.00" y="166.00" width="318.00" height="30.00" rx="4" fill="#fbfaf7" stroke="#d7dde8" stroke-width="1"/>
<text x="749.00" y="184.00" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">ΔEN−JP=+0.27 stars (95% CI 0.14–0.40)</text>
<rect x="920.00" y="166.00" width="98.00" height="30.00" rx="4" fill="#fbfaf7" stroke="#d7dde8" stroke-width="1"/>
<text x="969.00" y="184.00" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#5b677a">p&lt;0.001</text>
