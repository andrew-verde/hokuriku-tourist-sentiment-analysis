<text x="1059.00" y="183.50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#fbfaf7">supported</text>
<text x="58.00" y="256.00" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">H3</text>
<text x="172.00" y="256.00" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#172033">Friction prevalence does NOT differ (+1.7pp, n.s.).</text>
<rect x="590.00" y="236.00" width="318.00" height="30.00" rx="4" fill="#fbfaf7" stroke="#d7dde8" stroke-width="1"/>
<text x="749.00" y="254.00" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">enjoyment +31pp; positive +24pp; recommendation +11pp</text>
<rect x="920.00" y="236.00" width="98.00" height="30.00" rx="4" fill="#fbfaf7" stroke="#d7dde8" stroke-width="1"/>
<text x="969.00" y="254.00" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#5b677a">p(FDR)&lt;0.001</text>
<rect x="1030.00" y="236.00" width="58.00" height="30.00" rx="4" fill="#2f6f73" stroke="#2f6f73" stroke-width="1"/>
<text x="1059.00" y="253.50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#fbfaf7">supported</text>
