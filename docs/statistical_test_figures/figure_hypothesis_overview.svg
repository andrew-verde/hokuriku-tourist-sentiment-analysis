<text x="1059.00" y="323.50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#fbfaf7">mixed</text>
<text x="32.00" y="420.00" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#5b677a">H1 Holm-adjusted; H3 Benjamini–Hochberg FDR. Rows nested in POIs; the within-POI paired row is the venue-clustering robustness check.</text>
