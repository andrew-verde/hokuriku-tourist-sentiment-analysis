<text x="749.00" y="114.00" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">Cramér&#x27;s V=0.14 (χ²=38.6)</text>
<rect x="920.00" y="96.00" width="98.00" height="30.00" rx="4" fill="#fbfaf7" stroke="#d7dde8" stroke-width="1"/>
<text x="969.00" y="114.00" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#5b677a">p(Holm)&lt;0.001</text>
