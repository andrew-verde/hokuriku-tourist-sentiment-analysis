# Chinese social-media friction codebook.
#
# Codes intentionally mirror config/friction_codebook.yaml so Xiaohongshu and
# Douyin title/text rows can be compared descriptively with Google-review
# English/Japanese friction outputs. Matching is substring-based and should be
# manually validated after real Chinese rows are populated.

friction_codes:

  transport_access:
    label: "Transport / Access"
    type: friction
    keywords:
      - 交通不便
      - 不方便
      - 公交
      - 巴士
      - 班次少
      - 车次少
      - 火车少
      - 电车少
      - 出租车少
      - 打车难
      - 远
      - 难去
      - 不好去
      - 转车
      - 换乘
      - 停车
      - 自驾

